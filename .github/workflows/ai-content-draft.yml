name: Generate AI Content Draft

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Target category"
        required: true
        type: choice
        options:
          - online-earning
          - freelancing
          - blogging
          - ai-tools
          - digital-skills
      topic:
        description: "Post topic or angle"
        required: true
        type: string
      title:
        description: "Post title"
        required: true
        type: string
      description:
        description: "Meta description"
        required: true
        type: string
      keywords:
        description: "Comma-separated target keywords"
        required: true
        type: string
      tags:
        description: "Comma-separated tags"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate markdown draft
        id: generate
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python scripts/generate_ai_post.py \
            --category "${{ inputs.category }}" \
            --topic "${{ inputs.topic }}" \
            --title "${{ inputs.title }}" \
            --description "${{ inputs.description }}" \
            --keywords "${{ inputs.keywords }}" \
            --tags "${{ inputs.tags }}" \
            --allow-disabled

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: "ai/draft-${{ github.run_id }}"
          commit-message: "Add AI draft: ${{ inputs.title }}"
          title: "AI Draft: ${{ inputs.title }}"
          body: |
            This PR was generated by the AI draft workflow.

            - Category: `${{ inputs.category }}`
            - Topic: `${{ inputs.topic }}`
            - Provider: `${{ steps.generate.outputs.provider }}`
            - Model: `${{ steps.generate.outputs.model }}`
            - Word count: `${{ steps.generate.outputs.word_count }}`
            - File: `${{ steps.generate.outputs.output_file }}`

            Review checklist:
            - [ ] Fact check important claims and stats
            - [ ] Add internal links to related posts
            - [ ] Ensure no guaranteed-income phrasing
            - [ ] Verify final SEO title/description
          labels: |
            ai-content
            needs-review
